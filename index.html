<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AR Gallery</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#startButton {
position:fixed; z-index:9999; top:50%; left:50%;
transform:translate(-50%,-50%);
padding:16px 28px; font-size:20px; border-radius:14px; border:none;
background:white; color:black;
}
#msg {
position:fixed; z-index:9999; bottom:20px; left:10px; right:10px;
color:white; background:rgba(0,0,0,0.6);
padding:10px; text-align:center; border-radius:10px; font-size:15px;
}
</style>
</head>

<body>

<button id="startButton">Start AR</button>
<div id="msg">Tap Start AR</div>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
color-space="sRGB"
renderer="colorManagement: true, physicallyCorrectLights"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-assets id="assets"></a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity id="targetsContainer"></a-entity>

</a-scene>

<script>
const gallery = [
  { label: "00", video: "00.mp4" },
  { label: "01", video: "01.mp4" },
  { label: "02", video: "02.mp4" },
  { label: "03", video: "03.mp4" },
  { label: "04", video: "04.mp4" },
  { label: "05", video: "05.mp4" },
  { label: "06", video: "06.mp4" },
  { label: "07", video: "07.mp4" },
  { label: "08", video: "08.mp4" },
  { label: "09", video: "09.mp4" },
  { label: "10", video: "10.mp4" },
  { label: "11", video: "11.mp4" },
  { label: "12", video: "12.mp4" },
  { label: "13", video: "13.mp4" },
  { label: "14", video: "14.mp4" },
  { label: "15", video: "15.mp4" },
  { label: "16", video: "16.mp4" },
  { label: "17", video: "17.mp4" },
  { label: "18", video: "18.mp4" },
  { label: "19", video: "19.mp4" },
  { label: "20", video: "20.mp4" },
  { label: "LINE", video: "line.mp4" },
  { label: "STICKER", video: "sticker.mp4" }
];

const startButton = document.getElementById("startButton");
const msg = document.getElementById("msg");
const assets = document.getElementById("assets");
const targetsContainer = document.getElementById("targetsContainer");

const videos = [];

gallery.forEach((item, index) => {
  const video = document.createElement("video");
  video.setAttribute("id", "video" + index);
  video.setAttribute("src", item.video);
  video.setAttribute("preload", "auto");
  video.setAttribute("loop", "");
  video.setAttribute("muted", "");
  video.setAttribute("playsinline", "");
  video.setAttribute("webkit-playsinline", "");
  assets.appendChild(video);
  videos.push(video);

  const target = document.createElement("a-entity");
  target.setAttribute("id", "target" + index);
  target.setAttribute("mindar-image-target", "targetIndex: " + index);

  const arVideo = document.createElement("a-video");
  arVideo.setAttribute("src", "#video" + index);
  arVideo.setAttribute("width", "1");
  arVideo.setAttribute("height", "0.65");
  arVideo.setAttribute("position", "0 0 0.03");

  target.appendChild(arVideo);
  targetsContainer.appendChild(target);

  target.addEventListener("targetFound", () => {
    pauseAllVideos();
    msg.innerText = item.label + " detected";
    video.currentTime = 0;
    video.play();
  });

  target.addEventListener("targetLost", () => {
    video.pause();
    msg.innerText = "Point camera at any AR picture";
  });
});

function pauseAllVideos() {
  videos.forEach(v => v.pause());
}

startButton.addEventListener("click", () => {
  startButton.style.display = "none";
  msg.innerText = "Point camera at any AR picture";
});
</script>

</body>
</html>
